<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Food Pyramid</title>
    <style>

    </style>
  </head>
  <body>
    <table>
      <caption> USDA Food Pyramid </caption>
      <thead>
        <tr>
          <th> </th>
          <th colspan="2">Serving Guidelines</th>
        </tr>
        <tr>
          <th>Food Group</th>
          <th>2005-2010</th>
          <th>2011-Present</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Dairy<span class="description">(milk, yogurt, cheese)</span></td>
          <td>2-3</td>
          <td>3-4</td>
        </tr>
        <tr>
          <td>Meat and Beans<span class="description">(beef, poultry, fish, beans)</span></td>
          <td>2-3</td>
          <td>5-6</td>
        </tr>
        <tr>
          <td>Fruits</td>
          <td>2-4</td>
          <td>2-4</td>
        </tr>
        <tr>
          <td>Vegetables</td>
          <td>3-5</td>
          <td>1-2</td>
        </tr>
        <tr>
          <td>Grains<span class="description">(breads, donuts, pop tarts)</span></td>
          <td>1-2</td>
          <td>3-5</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
