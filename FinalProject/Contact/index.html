<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mattox Ward - Portfolio</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo-container">
      <img src="logo.png" alt="Logo" class="logo-image">
      <span class="brand-name">Mattox Ward</span>
    </div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">About Me</a>
      <div class="dropdown">
        <a href="#" class="dropdown-main">Portfolio ▾</a>
          <div class="dropdown-content">
            <a href="video.html">Video Editing</a>
            <a href="graphic.html">Graphic Design</a>
            <a href="photography.html">Photography</a>
            <a href="journalism.html">Journalism</a>
          </div>
      </div>
      <a href="#">Achievements</a>
      <a href="#">Video Progress</a>
      <a href='#' class="active">Contact</a>
    </div>
  </nav>

  <main class="contact">
    <section class="contact-section">
      <h2 class="contact-title">CONTACT ME</h2>
      <p class="contact-subtext">Have a business inquiry or a video idea for the channel? Fill out the form below!</p>

      <form id="contactForm" class="contact-form">
        <div class="input-group">
          <input type="text" id="name" name="name" required placeholder="Enter your name:">
        </div>

        <div class="input-group">
          <input type="email" id="email" name="email" required placeholder="Enter your email:">
        </div>

        <div class="input-group">
          <textarea id="message" name="message" rows="6" required placeholder="Write your message..."></textarea>
        </div>
        
        <button type="submit" class="contact-button">Send Message</button>
      </form>
      <div id="formStatus" class="status-msg"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
